<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Даши ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor-follower"></div>
    <section class="hero">
        <div class="hearts-container" id="hearts-container"></div>
        <div class="hero-content">
            <h1 class="title">Я люблю тебя, Даша</h1>
            <p class="subtitle">Больше, чем слова могут сказать</p>
            <div class="scroll-indicator">
                <span>Листай вниз</span>
                <div class="arrow">↓</div>
            </div>
        </div>
    </section>

    <section class="message-section">
        <div class="message-content" id="message-container">
            <p class="reveal-text">Ты — самое дорогое,</p>
            <p class="reveal-text">что есть в моей жизни.</p>
            <p class="reveal-text">Твоя улыбка освещает мой день,</p>
            <p class="reveal-text">а твой смех — моя любимая музыка.</p>
            <p class="reveal-text highlight">Я люблю тебя. Всегда.</p>
        </div>
    </section>

    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
